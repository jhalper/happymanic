<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#121110"/>

  <!-- Outer orbital ring (ellipse, angled) -->
  <ellipse cx="16" cy="16" rx="12" ry="5.5"
    transform="rotate(-35 16 16)"
    fill="none" stroke="#76B900" stroke-width="1.8"/>

  <!-- Mask to hide ring segment behind sphere -->
  <circle cx="16" cy="16" r="7.2" fill="#121110"/>

  <!-- Central sphere -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#76B900" stroke-width="1.8"/>

  <!-- Inner sphere fill with subtle radial glow -->
  <radialGradient id="glow" cx="40%" cy="38%" r="60%">
    <stop offset="0%" stop-color="#76B900" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#76B900" stop-opacity="0"/>
  </radialGradient>
  <circle cx="16" cy="16" r="7" fill="url(#glow)"/>

  <!-- Re-draw front arc of the ring (on top of sphere) -->
  <path d="M 9.5 19.8 A 12 5.5 0 0 0 22.5 12.2"
    transform="rotate(-35 16 16)"
    fill="none" stroke="#76B900" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Small dot at center for polish -->
  <circle cx="16" cy="16" r="1.8" fill="#76B900"/>
</svg>
